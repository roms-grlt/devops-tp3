# Play 1 : installer Docker (modules apt/service → interpréteur python système)
- hosts: all
  gather_facts: true
  become: true
  roles:
    - docker

# Play 2 : déployer l'application (modules docker_* → interpréteur du venv contenant le SDK docker)
- hosts: all
  gather_facts: false
  become: true
  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python
  roles:
    - network
    - database
    - app
    - front
    - proxy
